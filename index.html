<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咪咪的每日用藥紀錄表</title>
    <style>
        :root {
            --primary-color: #ff9999;
            --secondary-color: #ffe6e6;
            --success-color: #e8f5e9;
            --success-border: #81c784;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fffaf0;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .date-display {
            text-align: center;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 25px;
        }

        .med-card {
            background: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
        }

        .med-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #d15b5b;
            margin-bottom: 10px;
        }

        .med-img-container {
            width: 100%;
            margin-bottom: 12px;
            text-align: center;
        }

        .med-img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            object-fit: cover;
            background-color: #f0f0f0; 
        }

        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .slot {
            flex: 1;
            min-width: 130px;
            background: white;
            border: 2px solid var(--primary-color);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: all 0.3s;
        }

        .slot.taken {
            background-color: var(--success-color);
            border-color: var(--success-border);
        }

        .slot-time {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .time-input {
            font-size: 0.9rem;
            padding: 3px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            width: 80px;
            display: none;
        }

        .slot.taken .time-input {
            display: block;
        }

        .med-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        .med-btn:hover {
            background-color: #ff6b6b;
        }

        .slot.taken .med-btn {
            display: none;
        }

        .reset-container {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .reset-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .reset-btn:hover {
            background-color: #e55b5b;
        }

        .history-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.85rem;
        }

        .clear-history-btn:hover {
            color: #ff6b6b;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 2px solid #eee;
            font-size: 0.95rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-date-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .history-details {
            font-size: 0.85rem;
            color: #666;
            padding-left: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 咪咪的每日用藥紀錄表</h1>
    <div class="date-display" id="currentDate">今日日期：</div>

    <div class="med-card" data-med-name="癲癇+鉀+維他命">
        <div class="med-title">1. 癲癇藥 + 鉀離子 + 維他命 (早晚各1顆)</div>
        <div class="med-img-container">
            <img src="med1.jpg.heic" alt="藥物照片" class="med-img" onerror="this.src='med1.jpg.HEIC'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med1-morning">
                <span class="slot-time">早上 ☀️</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med1-morning')">吃藥了</button>
            </div>
            <div class="slot" id="med1-night">
                <span class="slot-time">晚上 🌙</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med1-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="癲癇+腸胃蠕動">
        <div class="med-title">2. 癲癇藥 + 腸胃蠕動 (每8小時1顆)</div>
        <div class="med-img-container">
            <img src="med2.jpg.heic" alt="藥物照片" class="med-img" onerror="this.style.display='none';">
        </div>
        <div class="time-slots">
            <div class="slot" id="med2-07">
                <span class="slot-time">早上 07:00 ⏰</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med2-07')">吃藥了</button>
            </div>
            <div class="slot" id="med2-15">
                <span class="slot-time">下午 15:00 ⏰</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med2-15')">吃藥了</button>
            </div>
            <div class="slot" id="med2-23">
                <span class="slot-time">晚上 23:00 ⏰</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med2-23')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="高血壓藥">
        <div class="med-title">3. 高血壓藥 (晚上1顆)</div>
        <div class="med-img-container">
            <img src="med3.jpg.heic" alt="藥物照片" class="med-img" onerror="this.style.display='none';">
        </div>
        <div class="time-slots">
            <div class="slot" id="med3-night">
                <span class="slot-time">晚上 🌙</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med3-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="中藥">
        <div class="med-title">4. 中藥 (早晚各1包)</div>
        <div class="med-img-container">
            <img src="med4.jpg.HEIC" alt="藥物照片" class="med-img" onerror="this.src='med4.jpg.heic'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med4-morning">
                <span class="slot-time">早上 ☀️</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med4-morning')">吃藥了</button>
            </div>
            <div class="slot" id="med4-night">
                <span class="slot-time">晚上 🌙</span>
                <input type="time" class="time-input" onchange="saveState()">
                <button class="med-btn" onclick="toggleMed('med4-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="reset-container">
        <button class="reset-btn" onclick="archiveAndReset()">💾 結算今日並開啟新的一天</button>
    </div>

    <div class="history-card">
        <div class="history-title">
            <span>📅 歷史用藥日誌 (含詳細時間)</span>
            <button class="clear-history-btn" onclick="clearHistory()">清空歷史</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
    </div>
</div>

<script>
    const today = new Date();
    const dateString = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;
    document.getElementById('currentDate').innerText = `今日日期：${dateString}`;

    window.onload = function() {
        const savedState = JSON.parse(localStorage.getItem('mimiMedRecordsTime版')) || {};
        for (const id in savedState) {
            if (savedState[id].taken) {
                setSlotAsTaken(id, savedState[id].time);
            }
        }
        updateHistoryDisplay();
    };

    function toggleMed(slotId) {
        const slot = document.getElementById(slotId);
        if (slot.classList.contains('taken')) return;

        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const currentTime = `${hours}:${minutes}`;

        setSlotAsTaken(slotId, currentTime);
        saveState();
    }

    function setSlotAsTaken(slotId, timeValue) {
        const slot = document.getElementById(slotId);
        if (slot) {
            slot.classList.add('taken');
            const input = slot.querySelector('.time-input');
            input.value = timeValue;
        }
    }

    function saveState() {
        const slots = document.querySelectorAll('.slot');
        const state = {};
        slots.forEach(slot => {
            const isTaken = slot.classList.contains('taken');
            const timeVal = slot.querySelector('.time-input').value;
            state[slot.id] = {
                taken: isTaken,
                time: isTaken ? timeVal : ''
            };
        });
        localStorage.setItem('mimiMedRecordsTime版', JSON.stringify(state));
    }

    function archiveAndReset() {
        const cards = document.querySelectorAll('.med-card');
        let detailsText = '';
        let totalCount = 0;
        let takenCount = 0;

        cards.forEach(card => {
            const medName = card.getAttribute('data-med-name');
            const slots = card.querySelectorAll('.slot');
            let medDetails = [];

            slots.forEach(slot => {
                totalCount++;
                const label = slot.querySelector('.slot-time').innerText.split(' ')[0];
                if (slot.classList.contains('taken')) {
                    takenCount++;
                    const time = slot.querySelector('.time-input').value;
                    medDetails.push(`${label}(${time})`);
                }
            });

            if (medDetails.length > 0) {
                detailsText += `• ${medName}: ${medDetails.join(', ')}<br>`;
            } else {
                detailsText += `• ${medName}: 未服藥<br>`;
            }
        });

        if (confirm(`確定要結算今日用藥嗎？\n今日共服藥 ${takenCount}/${totalCount} 次。`)) {
            const history = JSON.parse(localStorage.getItem('mimiMedHistoryTime版')) || [];
            history.unshift({
                date: dateString,
                score: `${takenCount}/${totalCount}`,
                details: detailsText
            });
            localStorage.setItem('mimiMedHistoryTime版', JSON.stringify(history));

            const slots = document.querySelectorAll('.slot');
            slots.forEach(slot => {
                slot.classList.remove('taken');
                slot.querySelector('.time-input').value = '';
            });
            localStorage.removeItem('mimiMedRecordsTime版');

            updateHistoryDisplay();
        }
    }

    function updateHistoryDisplay() {
        const historyList = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('mimiMedHistoryTime版')) || [];
        
        if (history.length === 0) {
            historyList.innerHTML = '<li class="history-item" style="color:#aaa; text-align:center;">暫無歷史紀錄</li>';
            return;
        }

        historyList.innerHTML = history.map(item => `
            <li class="history-item">
                <div class="history-date-row">
                    <span>📆 ${item.date}</span>
                    <span>得分：${item.score}</span>
                </div>
                <div class="history-details">${item.details}</div>
            </li>
        `).join('');
    }

    function clearHistory() {
        if (confirm('確定要清空所有的詳細用藥紀錄嗎？此操作無法恢復喔！')) {
            localStorage.removeItem('mimiMedHistoryTime版');
            updateHistoryDisplay();
        }
    }
</script>

</body>
</html>
