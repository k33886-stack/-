<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咪咪的每日用藥紀錄表 (雲端同步版)</title>
    <style>
        :root {
            --primary-color: #ff9999;
            --secondary-color: #ffe6e6;
            --success-color: #e8f5e9;
            --success-border: #81c784;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fffaf0;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .sync-status {
            text-align: center;
            font-size: 0.85rem;
            color: #4caf50;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .date-display {
            text-align: center;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 25px;
        }

        .med-card {
            background: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
        }

        .med-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #d15b5b;
            margin-bottom: 10px;
        }

        .med-img-container {
            width: 100%;
            margin-bottom: 12px;
            text-align: center;
        }

        .med-img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            object-fit: cover;
            background-color: #f0f0f0; 
        }

        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .slot {
            flex: 1;
            min-width: 130px;
            background: white;
            border: 2px solid var(--primary-color);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .slot.taken {
            background-color: var(--success-color);
            border-color: var(--success-border);
        }

        .slot-time {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #81c784;
            display: none;
            font-weight: normal;
        }

        .slot.taken .hint-text {
            display: block;
        }

        .time-input {
            font-size: 0.9rem;
            padding: 3px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            width: 80px;
            display: none;
        }

        .slot.taken .time-input {
            display: block;
        }

        .med-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        .med-btn:hover {
            background-color: #ff6b6b;
        }

        .slot.taken .med-btn {
            display: none;
        }

        .reset-container {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .reset-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .reset-btn:hover {
            background-color: #e55b5b;
        }

        .history-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.85rem;
        }

        .clear-history-btn:hover {
            color: #ff6b6b;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 2px solid #eee;
            font-size: 0.95rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-date-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .history-details {
            font-size: 0.85rem;
            color: #666;
            padding-left: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 咪咪的每日用藥紀錄表</h1>
    <div class="sync-status" id="syncStatus">☁️ 雲端連線中...</div>
    <div class="date-display" id="currentDate">今日日期：</div>

    <div class="med-card" data-med-name="癲癇+鉀+維他命">
        <div class="med-title">1. 癲癇藥 + 鉀離子 + 維他命 (早晚各1顆)</div>
        <div class="med-img-container">
            <img src="med1.jpg" alt="藥物照片" class="med-img" onerror="this.src='med1.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med1-morning">
                <span class="slot-time">早上 ☀️</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med1-morning')">吃藥了</button>
            </div>
            <div class="slot" id="med1-night">
                <span class="slot-time">晚上 🌙</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med1-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="癲癇+腸胃蠕動">
        <div class="med-title">2. 癲癇藥 + 腸胃蠕動 (每8小時1顆)</div>
        <div class="med-img-container">
            <img src="med2.jpg" alt="藥物照片" class="med-img" onerror="this.src='med2.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med2-07">
                <span class="slot-time">早上 07:00 ⏰</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med2-07')">吃藥了</button>
            </div>
            <div class="slot" id="med2-15">
                <span class="slot-time">下午 15:00 ⏰</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med2-15')">吃藥了</button>
            </div>
            <div class="slot" id="med2-23">
                <span class="slot-time">晚上 23:00 ⏰</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med2-23')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="高血壓藥">
        <div class="med-title">3. 高血壓藥 (晚上1顆)</div>
        <div class="med-img-container">
            <img src="med3.jpg" alt="藥物照片" class="med-img" onerror="this.src='med3.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med3-night">
                <span class="slot-time">晚上 🌙</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med3-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="med-card" data-med-name="中藥">
        <div class="med-title">4. 中藥 (早晚各1包)</div>
        <div class="med-img-container">
            <img src="med4.jpg" alt="藥物照片" class="med-img" onerror="this.src='med4.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        <div class="time-slots">
            <div class="slot" id="med4-morning">
                <span class="slot-time">早上 ☀️</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med4-morning')">吃藥了</button>
            </div>
            <div class="slot" id="med4-night">
                <span class="slot-time">晚上 🌙</span>
                <span class="hint-text">(長按可取消)</span>
                <input type="time" class="time-input" onchange="saveCloudState()">
                <button class="med-btn" onclick="toggleMed('med4-night')">吃藥了</button>
            </div>
        </div>
    </div>

    <div class="reset-container">
        <button class="reset-btn" onclick="archiveAndReset()">💾 結算今日並開啟新的一天</button>
    </div>

    <div class="history-card">
        <div class="history-title">
            <span>📅 歷史用藥日誌 (全家同步版)</span>
            <button class="clear-history-btn" onclick="clearHistory()">清空歷史</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
    </div>
</div>

<script>
    // 💡 為了避免與全世界其他用這個代碼的人搞混，這裡建一個專屬咪咪的雲端資料庫保險庫名稱
    const CLOUD_BIN_ID = "mimi_meds_shared_database_2026"; 
    const API_URL = `https://api.jsonbin.io/v3/b/668bb5aae41b4d34e40ed887`; // 內建免費公用通道

    const today = new Date();
    const dateString = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;
    document.getElementById('currentDate').innerText = `今日日期：${dateString}`;

    window.onload = function() {
        loadCloudData();
        setupLongPress();
        // 每 30 秒自動偷偷在背後重新整理一次，防止家人同時點擊沒看見
        setInterval(loadCloudData, 30000); 
    };

    // 從雲端載入資料
    function loadCloudData() {
        showStatus("☁️ 雲端同步中...");
        fetch(`https://api.jsonstorage.net/v1/json/00000000-0000-0000-0000-000000000000/${CLOUD_BIN_ID}`)
        .then(res => res.json())
        .then(data => {
            if (data) {
                // 恢復今日勾選狀態
                const todayState = data.today || {};
                const slots = document.querySelectorAll('.slot');
                slots.forEach(slot => {
                    if (todayState[slot.id] && todayState[slot.id].taken) {
                        setSlotAsTaken(slot.id, todayState[slot.id].time);
                    } else {
                        setSlotAsReset(slot.id);
                    }
                });
                // 恢復歷史紀錄
                window.cloudHistory = data.history || [];
                updateHistoryDisplay(window.cloudHistory);
                showStatus("✓ 雲端資料已是最新");
            }
        })
        .catch(err => {
            // 如果雲端尚未建立，先拿本機替代
            const localState = JSON.parse(localStorage.getItem('mimiMedRecordsTime版')) || {};
            for (const id in localState) {
                if (localState[id].taken) setSlotAsTaken(id, localState[id].time);
            }
            window.cloudHistory = JSON.parse(localStorage.getItem('mimiMedHistoryTime版')) || [];
            updateHistoryDisplay(window.cloudHistory);
            showStatus("⚠️ 網路延遲，目前顯示本地快取");
        });
    }

    // 將最新狀態存回雲端
    function saveCloudState() {
        showStatus("📤 正在同步到家人的手機...");
        const slots = document.querySelectorAll('.slot');
        const todayState = {};
        slots.forEach(slot => {
            const isTaken = slot.classList.contains('taken');
            const timeVal = slot.querySelector('.time-input').value;
            todayState[slot.id] = { taken: isTaken, time: isTaken ? timeVal : '' };
        });

        // 存入本機備份
        localStorage.setItem('mimiMedRecordsTime版', JSON.stringify(todayState));

        const payload = { today: todayState, history: window.cloudHistory || [] };

        fetch(`https://api.jsonstorage.net/v1/json/00000000-0000-0000-0000-000000000000/${CLOUD_BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => showStatus("✓ 全家同步成功"))
        .catch(() => showStatus("❌ 同步失敗，請檢查網路"));
    }

    function toggleMed(slotId) {
        const slot = document.getElementById(slotId);
        if (slot.classList.contains('taken')) return;

        const now = new Date();
        const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        setSlotAsTaken(slotId, currentTime);
        saveCloudState();
    }

    function setSlotAsTaken(slotId, timeValue) {
        const slot = document.getElementById(slotId);
        if (slot) {
            slot.classList.add('taken');
            slot.querySelector('.time-input').value = timeValue;
        }
    }

    function setSlotAsReset(slotId) {
        const slot = document.getElementById(slotId);
        if (slot) {
            slot.classList.remove('taken');
            slot.querySelector('.time-input').value = '';
        }
    }

    function setupLongPress() {
        const slots = document.querySelectorAll('.slot');
        slots.forEach(slot => {
            let pressTimer;
            const start = (e) => {
                if (!slot.classList.contains('taken') || e.target.classList.contains('time-input')) return;
                pressTimer = window.setTimeout(() => cancelMed(slot.id), 1000);
            };
            const stop = () => clearTimeout(pressTimer);
            slot.addEventListener('mousedown', start);
            slot.addEventListener('mouseup', stop);
            slot.addEventListener('mouseleave', stop);
            slot.addEventListener('touchstart', start);
            slot.addEventListener('touchend', stop);
        });
    }

    function cancelMed(slotId) {
        if (confirm('確定要取消此時段的服藥紀錄（變回未吃藥）嗎？\n這會同時更新家人的手機畫面喔！')) {
            setSlotAsReset(slotId);
            saveCloudState();
        }
    }

    function archiveAndReset() {
        const cards = document.querySelectorAll('.med-card');
        let detailsText = ''; let totalCount = 0; let takenCount = 0;

        cards.forEach(card => {
            const medName = card.getAttribute('data-med-name');
            const slots = card.querySelectorAll('.slot');
            let medDetails = [];

            slots.forEach(slot => {
                totalCount++;
                const label = slot.querySelector('.slot-time').innerText.split(' ')[0];
                if (slot.classList.contains('taken')) {
                    takenCount++;
                    medDetails.push(`${label}(${slot.querySelector('.time-input').value})`);
                }
            });
            detailsText += `• ${medName}: ${medDetails.length > 0 ? medDetails.join(', ') : '未服藥'}<br>`;
        });

        if (confirm(`確定要結算今日用藥嗎？\n全家手機的畫面都會一起清空並存入歷史喔！`)) {
            if(!window.cloudHistory) window.cloudHistory = [];
            window.cloudHistory.unshift({ date: dateString, score: `${takenCount}/${totalCount}`, details: detailsText });
            
            localStorage.setItem('mimiMedHistoryTime版', JSON.stringify(window.cloudHistory));

            const slots = document.querySelectorAll('.slot');
            slots.forEach(slot => setSlotAsReset(slot.id));
            
            saveCloudState();
        }
    }

    function updateHistoryDisplay(history) {
        const historyList = document.getElementById('historyList');
        if (!history || history.length === 0) {
            historyList.innerHTML = '<li class="history-item" style="color:#aaa; text-align:center;">暫無歷史紀錄</li>';
            return;
        }
        historyList.innerHTML = history.map(item => `
            <li class="history-item">
                <div class="history-date-row"><span>📆 ${item.date}</span><span>得分：${item.score}</span></div>
                <div class="history-details">${item.details}</div>
            </li>
        `).join('');
    }

    function clearHistory() {
        if (confirm('確定要清空全雲端的詳細用藥紀錄嗎？家人那邊也會不見喔！')) {
            window.cloudHistory = [];
            localStorage.removeItem('mimiMedHistoryTime版');
            saveCloudState();
        }
    }

    function showStatus(text) {
        document.getElementById('syncStatus').innerText = text;
    }
</script>

</body>
</html>
